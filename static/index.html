<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#141418" />
  <title>Mando Android TV</title>
  <style>
    :root {
      --bg: #141418;
      --panel: #1e1e24;
      --btn: #2a2a32;
      --btn-dpad: #25252d;
      --accent: #c9a227;
      --muted: #8a8a96;
      --text: #e8e8ed;
      --danger: #4a1518;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding: 12px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }
    h1 { font-size: 1.35rem; margin: 0 0 4px; font-weight: 700; }
    .sub { color: var(--muted); font-size: 0.9rem; margin-bottom: 12px; }
    .panel {
      background: var(--panel);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
    }
    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border: none;
      border-radius: 8px;
      background: #0e0e12;
      color: var(--text);
      font-size: 1rem;
      margin-top: 8px;
    }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .btn { background: var(--btn); color: var(--text); }
    .btn:active:not(:disabled) { filter: brightness(1.15); }
    .btn-primary { background: var(--accent); color: #111; }
    .btn-danger { background: var(--danger); color: var(--text); }
    .btn-dpad { background: var(--btn-dpad); min-width: 72px; min-height: 48px; font-size: 1.1rem; }
    #status { color: var(--accent); font-size: 0.85rem; min-height: 1.2em; margin-top: 10px; }
    .section-label {
      color: var(--muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 0 0 8px;
    }
    #devices {
      min-height: 120px;
      max-height: 280px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .device-row {
      padding: 14px 12px;
      margin-bottom: 8px;
      border-radius: 10px;
      background: #0e0e12;
      border: 2px solid transparent;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .device-row:active { filter: brightness(1.08); }
    .device-row.selected {
      border-color: var(--accent);
      background: #1a1810;
    }
    .device-row .name { font-weight: 600; color: var(--text); margin-bottom: 4px; }
    .device-row .ip { font-family: ui-monospace, Menlo, monospace; font-size: 0.85rem; color: var(--muted); }
    #remote { display: none; }
    #remote.visible { display: block; }
    #connect-ui.hidden { display: none; }
    .section-label.nav { margin: 16px 0 8px; }
    .dpad {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      max-width: 280px;
      margin: 0 auto;
    }
    .dpad .spacer { visibility: hidden; }
    #pair-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 100;
    }
    #pair-modal.open { display: flex; }
    #pair-modal .box {
      background: var(--panel);
      border-radius: 14px;
      padding: 20px;
      width: 100%;
      max-width: 320px;
    }
    details.manual-ip { margin-top: 12px; }
    details.manual-ip summary {
      color: var(--muted);
      cursor: pointer;
      font-size: 0.88rem;
      user-select: none;
    }
    details.manual-ip[open] summary { margin-bottom: 4px; }
    .empty-hint { color: var(--muted); font-size: 0.88rem; padding: 16px 8px; text-align: center; }
  </style>
</head>
<body>
  <h1>Android TV</h1>
  <p class="sub">Elige tu televisor en la lista (mismo Wi‑Fi que el ordenador que ejecuta el servidor).</p>

  <div id="connect-ui">
    <div class="panel">
      <p class="section-label" style="margin-top:0">Dispositivos encontrados</p>
      <p id="scan-hint" class="sub" style="margin-top:0;margin-bottom:10px">Buscando en la red…</p>
      <div id="devices"></div>
      <div class="row" style="margin-top:12px">
        <button type="button" class="btn" id="btn-scan">Buscar de nuevo</button>
        <button type="button" class="btn-primary" id="btn-connect" disabled>Conectar</button>
      </div>
      <details class="manual-ip">
        <summary>¿No aparece tu TV? Conectar por IP</summary>
        <input type="text" id="ip" placeholder="Ej. 192.168.1.47" inputmode="numeric" autocomplete="off" />
      </details>
      <div id="status"></div>
    </div>
  </div>

  <div id="pair-modal">
    <div class="box">
      <p style="margin-top:0">Introduce el código de 6 caracteres hex que muestra la TV.</p>
      <input type="text" id="pair-code" placeholder="a1b2c3" maxlength="6" autocomplete="off" />
      <div class="row" style="margin-top:12px">
        <button type="button" class="btn-primary" id="pair-submit">Emparejar</button>
      </div>
    </div>
  </div>

  <div id="remote">
    <p class="sub" style="margin-top:0">Mando</p>
    <div class="row" style="margin-bottom:12px">
      <button type="button" class="btn-danger btn" data-key="POWER">⏻</button>
      <button type="button" class="btn" data-key="HOME">⌂</button>
      <button type="button" class="btn" data-key="BACK">↩</button>
    </div>
    <div class="row" style="justify-content:center">
      <button type="button" class="btn" data-key="VOLUME_UP">Vol +</button>
      <button type="button" class="btn" data-key="VOLUME_DOWN">Vol −</button>
    </div>
    <div class="row" style="justify-content:center; margin-top:8px">
      <button type="button" class="btn" data-key="MUTE">Mudo</button>
      <button type="button" class="btn" data-key="MENU">Menú</button>
    </div>

    <div class="section-label nav">Navegación</div>
    <div class="dpad">
      <div class="spacer"></div>
      <button type="button" class="btn-dpad btn" data-key="DPAD_UP">▲</button>
      <div class="spacer"></div>
      <button type="button" class="btn-dpad btn" data-key="DPAD_LEFT">◀</button>
      <button type="button" class="btn-dpad btn" data-key="DPAD_CENTER">OK</button>
      <button type="button" class="btn-dpad btn" data-key="DPAD_RIGHT">▶</button>
      <div class="spacer"></div>
      <button type="button" class="btn-dpad btn" data-key="DPAD_DOWN">▼</button>
      <div class="spacer"></div>
    </div>

    <div class="section-label nav">Reproducción</div>
    <div class="row" style="justify-content:center">
      <button type="button" class="btn" data-key="MEDIA_REWIND">⏮</button>
      <button type="button" class="btn" data-key="MEDIA_PLAY_PAUSE">⏯</button>
      <button type="button" class="btn" data-key="MEDIA_FAST_FORWARD">⏭</button>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const statusEl = $("status");
    const btnScan = $("btn-scan");
    const btnConnect = $("btn-connect");
    const devicesEl = $("devices");
    const ipInput = $("ip");
    const scanHint = $("scan-hint");

    let selected = null;

    function setStatus(msg) {
      statusEl.textContent = msg || "";
    }

    function errDetail(data, r) {
      const d = data.detail;
      if (Array.isArray(d)) return d.map((x) => x.msg || JSON.stringify(x)).join("; ");
      if (typeof d === "string") return d;
      return data.message || r.statusText;
    }

    async function api(path, body) {
      const r = await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: body ? JSON.stringify(body) : "{}",
      });
      const data = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(errDetail(data, r));
      return data;
    }

    function clearSelection() {
      selected = null;
      devicesEl.querySelectorAll(".device-row").forEach((el) => el.classList.remove("selected"));
    }

    function updateConnectButton() {
      const manual = ipInput.value.trim();
      const hasManual = manual.length >= 7;
      btnConnect.disabled = !selected && !hasManual;
    }

    function renderDevices(list) {
      devicesEl.innerHTML = "";
      clearSelection();
      if (!list.length) {
        devicesEl.innerHTML =
          '<p class="empty-hint">No se ha encontrado ningún Android TV. Comprueba que esté encendido y en la misma red, o usa «Conectar por IP» abajo.</p>';
        updateConnectButton();
        return;
      }
      list.forEach((d) => {
        const row = document.createElement("div");
        row.className = "device-row";
        row.dataset.ip = d.ip;
        row.dataset.name = d.name;
        row.innerHTML = '<div class="name"></div><div class="ip"></div>';
        row.querySelector(".name").textContent = d.name.replace(/\.$/, "") || "Android TV";
        row.querySelector(".ip").textContent = d.ip;
        row.onclick = () => {
          devicesEl.querySelectorAll(".device-row").forEach((el) => el.classList.remove("selected"));
          row.classList.add("selected");
          selected = { ip: d.ip, name: d.name };
          ipInput.value = "";
          updateConnectButton();
        };
        devicesEl.appendChild(row);
      });
      updateConnectButton();
    }

    async function runScan() {
      btnScan.disabled = true;
      btnConnect.disabled = true;
      scanHint.textContent = "Buscando en la red…";
      setStatus("");
      devicesEl.innerHTML = '<p class="empty-hint">Escaneando…</p>';
      clearSelection();
      try {
        const data = await api("/api/scan");
        renderDevices(data.devices || []);
        scanHint.textContent = data.devices.length
          ? data.devices.length + " dispositivo(s) — toca uno y pulsa Conectar"
          : "Ningún dispositivo — prueba «Buscar de nuevo» o IP manual";
      } catch (e) {
        scanHint.textContent = "Error al buscar";
        setStatus(e.message);
        devicesEl.innerHTML = '<p class="empty-hint">No se pudo escanear. Revisa la red o usa IP manual.</p>';
      } finally {
        btnScan.disabled = false;
        updateConnectButton();
      }
    }

    btnScan.onclick = () => runScan();

    ipInput.addEventListener("input", () => {
      if (ipInput.value.trim()) clearSelection();
      updateConnectButton();
    });

    function resolveIp() {
      const manual = ipInput.value.trim();
      if (manual.length >= 7) return manual;
      if (selected) return selected.ip;
      return "";
    }

    btnConnect.onclick = async () => {
      const ip = resolveIp();
      if (!ip) {
        setStatus("Selecciona un dispositivo de la lista o escribe una IP.");
        return;
      }
      setStatus("Conectando…");
      btnConnect.disabled = true;
      try {
        const data = await api("/api/connect", { ip });
        if (data.state === "pairing") {
          setStatus("Emparejamiento: mira la TV");
          $("pair-modal").classList.add("open");
          $("pair-code").value = "";
          $("pair-code").focus();
        } else {
          showRemote();
        }
      } catch (e) {
        setStatus("Error: " + e.message);
      } finally {
        updateConnectButton();
      }
    };

    function showRemote() {
      $("connect-ui").classList.add("hidden");
      $("remote").classList.add("visible");
      setStatus("");
    }

    $("pair-submit").onclick = async () => {
      const code = $("pair-code").value.trim();
      if (code.length !== 6) {
        alert("El código debe tener 6 caracteres hex.");
        return;
      }
      try {
        await api("/api/pair", { code });
        $("pair-modal").classList.remove("open");
        showRemote();
      } catch (e) {
        alert(e.message);
      }
    };

    document.querySelectorAll("#remote [data-key]").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const key = btn.getAttribute("data-key");
        try {
          await api("/api/key", { key });
        } catch (e) {
          setStatus("Sin conexión: " + e.message);
        }
      });
    });

    fetch("/api/status")
      .then((r) => r.json())
      .then((d) => {
        if (d.connected) showRemote();
        else runScan();
      })
      .catch(() => runScan());
  </script>
</body>
</html>
