# Port mapping (bridge): use on Docker Desktop for Mac/Windows where host network is unavailable.
# Discovery may be empty — use "Connect by IP" in the web UI.
services:
  androidtv:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: androidtv-remote
    ports:
      - "${ANDROIDTV_PORT:-8765}:${ANDROIDTV_PORT:-8765}"
    environment:
      ANDROIDTV_PORT: ${ANDROIDTV_PORT:-8765}
    restart: unless-stopped
    volumes:
      - androidtv-config:/root/.config/androidtv-remote

volumes:
  androidtv-config:
