# Linux only: host network so mDNS can discover TVs (optional).
# Usage: docker compose -f docker-compose.host.yml up --build
# Then open http://127.0.0.1:8765 (port is ANDROIDTV_PORT inside the container).

services:
  androidtv:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: androidtv-remote
    network_mode: host
    environment:
      ANDROIDTV_PORT: "8765"
    restart: unless-stopped
    volumes:
      - androidtv-config:/root/.config/androidtv-remote

volumes:
  androidtv-config:
